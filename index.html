  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

tems: center; gap: 10px; text-decoration: none; }\n  .logo-icon { width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }\n  .logo-text { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 3px; color: var(--white); line-height: 1; }\n  .logo-text span { color: var(--copper); }\n  .logo-tagline { font-size: 8px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; color: var(--copper); opacity: 0.65; display: block; margin-top: 1px; }\n  /* Facebook top bar */\n  .fb-topbar { background: #1877F2; padding: 8px 5%; display: flex; align-items: center; justify-content: center; gap: 9px; font-size: 12px; font-weight: 500; color: #fff; text-decoration: none; letter-spacing: 0.3px; transition: background 0.2s; }\n  .fb-topbar:hover { background: #1565d8; }\n  .fb-topbar svg { width: 15px; height: 15px; fill: #fff; flex-shrink: 0; }\n  .fb-topbar strong { font-weight: 700; }\n  /* Nav fb icon */\n  .nav-fb { display: flex; align-items: center; justify-content: center; width: 32px; height: 32px; border-radius: 6px; background: rgba(24,119,242,0.1); border: 1px solid rgba(24,119,242,0.25); color: #5898d4; transition: all 0.2s; flex-shrink: 0; }\n  .nav-fb:hover { background: rgba(24,119,242,0.2); border-color: rgba(24,119,242,0.5); }\n  .nav-fb svg { width: 14px; height: 14px; fill: currentColor; }\n  .nav-links { display: flex; align-items: center; gap: 32px; list-style: none; }\n  .nav-links a { text-decoration: none; color: var(--muted); font-size: 14px; font-weight: 500; letter-spacing: 0.5px; transition: color 0.2s; }\n  .nav-links a:hover { color: var(--white); }\n  .btn-nav { padding: 9px 22px; background: var(--copper); color: var(--black) !important; border-radius: 4px; font-weight: 600 !important; font-size: 13px !important; letter-spacing: 0.5px; transition: background 0.2s, transform 0.1s !important; }\n  .btn-nav:hover { background: var(--copper-lt) !important; transform: translateY(-1px); }\n\n  /* HERO */\n  .hero { min-height: 100vh; display: flex; align-items: center; justify-content: center; position: relative; overflow: hidden; padding: 200px 5% 80px; }\n  .hero-bg { position: absolute; inset: 0; background: var(--black); z-index: 0; }\n  .hero-bg::before { content: ''; position: absolute; inset: 0; background-image: repeating-linear-gradient(0deg, transparent, transparent 48px, rgba(200,120,58,0.025) 48px, rgba(200,120,58,0.025) 49px), repeating-linear-gradient(90deg, transparent, transparent 80px, rgba(91,184,212,0.015) 80px, rgba(91,184,212,0.015) 81px); }\n  .hero-bg::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 300px; background: linear-gradient(to top, var(--black), transparent); }\n  .hero-glow { position: absolute; width: 700px; height: 700px; border-radius: 50%; background: radial-gradient(circle, rgba(200,120,58,0.10) 0%, rgba(91,184,212,0.04) 50%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }\n  .hero-content { position: relative; z-index: 1; max-width: 900px; text-align: center; }\n  .hero-badge { display: inline-flex; align-items: center; gap: 8px; padding: 6px 16px; border: 1px solid rgba(200,120,58,0.4); border-radius: 100px; font-size: 12px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; color: var(--copper); margin-bottom: 32px; animation: fadeInDown 0.6s ease both; }\n  .badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--copper); animation: pulse 2s infinite; }\n  @keyframes pulse { 0%,100%{ opacity:1; transform:scale(1); } 50%{ opacity:0.5; transform:scale(1.4); } }\n  .hero h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(52px, 8vw, 96px); line-height: 0.95; letter-spacing: 2px; color: var(--white); margin-bottom: 28px; overflow-x: clip; overflow-y: visible; }\n  .hero h1 .accent { color: var(--copper); }\n  .hero h1 .line2 { display: block; -webkit-text-stroke: 1px rgba(200,12 mo:hover { border-color: var(--copper); background: rgba(200,120,58,.08); color: var(--copper-lt); }\n  .btn-demo-icon { width: 26px; height: 26px; border-radius: 50%; background: var(--copper); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }\n  .btn-demo-icon svg { fill: var(--black); margin-left: 2px; }\n\n  /* SEASON BANNER */\n  .season-banner { position: fixed; top: 70px; left: 0; right: 0; z-index: 99; background: linear-gradient(90deg,rgba(200,120,58,.18),rgba(200,120,58,.07) 50%,rgba(200,120,58,.18)); border-bottom: 1px solid rgba(200,120,58,.3); padding: 9px 5%; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 13px; color: var(--text); flex-wrap: wrap; }\n  .season-banner strong { color: var(--copper); font-weight: 600; }\n  .season-banner a { color: var(--copper); text-decoration: none; font-weight: 600; margin-left: 4px; border-bottom: 1px solid rgba(200,120,58,.4); white-space: nowrap; }\n  .season-banner a:hover { border-bottom-color: var(--copper); }\n  .s-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--copper); animation: pulse 2s infinite; flex-shrink: 0; }\n\n  /* GUARANTEE */\n  .guarantee-bar { background: var(--dark); border-bottom: 1px solid rgba(76,175,120,.12); padding: 16px 5%; }\n  .guarantee-items { max-width: 960px; margin: 0 auto; display: flex; align-items: center; justify-content: center; flex-wrap: wrap; gap: 8px 40px; }\n  .g-item { font-size: 13px; color: var(--text); display: flex; align-items: center; gap: 7px; font-weight: 500; }\n  .g-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--success); flex-shrink: 0; }\n\n  /* STATS */\n  .stats-bar { padding: 40px 5%; background: var(--card); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); }\n  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(160px, 1fr)); gap: 2px; max-width: 1100px; margin: 0 auto; }\n  .stat-item { text-align ont-size: 14px; color: var(--muted); }\n  .video-error-state a { font-size: 13px; color: var(--copper); text-decoration: none; border-bottom: 1px solid rgba(200,120,58,.4); padding-bottom: 2px; }\n\n  /* ANIMATIONS */\n  @keyframes fadeInDown { from{ opacity:0; transform:translateY(-20px); } to{ opacity:1; transform:translateY(0); } }\n  @keyframes fadeInUp { from{ opacity:0; transform:translateY(30px); } to{ opacity:1; transform:translateY(0); } }\n  .reveal { opacity: 0; transform: translateY(40px); transition: opacity 0.7s ease, transform 0.7s ease; }\n  .reveal.visible { opacity: 1; transform: translateY(0); }\n\n  /* === HERO MOTION — expo-out choreography (ported animation feel) === */\n  .hero-content { perspective: 1000px; }\n  .h-line { display: block; will-change: transform; }\n  .hl-left  { animation: heroSlideL .9s cubic-bezier(.16,1,.3,1) both; animation-delay: var(--d, 0s); }\n  .hl-right { animation: heroSlideR .9s cubic-bezier(.16,1,.3,1) both; animation-delay: var(--d, 0s); }\n  @keyframes heroSlideL { from { transform: translateX(-110%); } to { transform: translateX(0); } }\n  @keyframes heroSlideR { from { transform: translateX(110%);  } to { transform: translateX(0); } }\n  .hero-sub .word { display: inline-block; overflow: clip; vertical-align: top; }\n  .hero-sub .word-in { display: inline-block; animation: wordUp .6s cubic-bezier(.16,1,.3,1) both; animation-delay: var(--d, 0s); }\n  @keyframes wordUp { from { opacity: 0; transform: translateY(105%) rotateX(45deg); } to { opacity: 1; transform: translateY(0) rotateX(0); } }\n  .hero-badge { animation: expoFadeDown .7s cubic-bezier(.16,1,.3,1) both; animation-delay: var(--d, .1s); }\n  .hero-ctas { animation: expoFadeUp .8s cubic-bezier(.16,1,.3,1) both; animation-delay: var(--d, .95s); }\n  .hero-wave { animation: expoFadeUp 1s cubic-bezier(.16,1,.3,1) both !important; animation-delay: 1.25s !important; }\n  .scroll-hint { animation: expoFadeUp 1s cubic-bezier(.16,1,.3,1) both !important; animation-delay: 1.5s !important; }\n  @keyframes expoFadeDown { from { opacity: 0; transform: translateY(-20px); } to { opacity: 1; transform: translateY(0); } }\n  @keyframes expoFadeUp { from { opacity: 0; transform: translateY(28px); } to { opacity: 1; transform: translateY(0); } }\n  .hero .btn-primary { transition: background .2s, transform .3s cubic-bezier(.16,1,.3,1); }\n  .hero .btn-primary:hover { transform: translateY(-2px) scale(1.05); }\n  .btn-demo { transition: border-color .2s, background .2s, color .2s, transform .3s cubic-bezier(.16,1,.3,1); }\n  .btn-demo:hover { transform: translateY(-2px) scale(1.05); }\n  .nav-logo { animation: expoFadeDown .6s cubic-bezier(.16,1,.3,1) both; }\n  .nav-links li { animation: expoFadeDown .6s cubic-bezier(.16,1,.3,1) both; animation-delay: var(--d, 0s); }\n  .nav-links a { transition: color .2s, transform .2s cubic-bezier(.16,1,.3,1); display: inline-block; }\n  .nav-links a:not(.btn-nav):hover { transform: translateX(2px); }\n\n  /* ============================================================\n     MOTION LAYER — added transitions & scroll choreography only\n     (no font / color / layout / content changes)\n     ============================================================ */\n  @media (prefers-reduced-motion: reduce){\n    *,*::before,*::after{ animation-duration:.001ms!important; animation-iteration-count:1!important; transition-duration:.001ms!important; scroll-behavior:auto!important; }\n  }\n\n  /* smoother expo-out scroll reveal with a touch of scale */\n  .reveal{ transform: translateY(44px) scale(.985); transition: opacity .8s cubic-bezier(.16,1,.3,1), transform .8s cubic-bezier(.16,1,.3,1); will-change: opacity, transform; }\n  .reveal.visible{ transform: translateY(0) scale(1); }\n\n  /* hero glow — gentle breathing + mouse parallax */\n  @keyframes glowPulse{ 0%,100%{ opacity:.82; } 50%{ opacity:1; } }\n  .hero-glow{ animation: glowPulse 7s ease-in-out infinite; transition: transform .6s cubic-bezier(.16,1, ">\n      <div class=\"lead-success-icon\">✓<\u002Fdiv>\n      <div class=\"lead-success-title\">Request received!<\u002Fdiv>\n      <div class=\"lead-success-msg\">We'll set up your free 7-day trial within 48 hours. Check your phone.<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  /* SCROLL REVEAL */\n  const revealEls = document.querySelectorAll('.reveal');\n  const observer = new IntersectionObserver((entries) => {\n    entries.forEach((e, i) => {\n      if (e.isIntersecting) { setTimeout(() => e.target.classList.add('visible'), i * 80); observer.unobserve(e.target); }\n    });\n  }, { threshold: 0.1, rootMargin: '0px 0px -60px 0px' });\n  revealEls.forEach(el => observer.observe(el));\n\n  /* NAV */\n  const nav = document.querySelector('nav');\n  window.addEventListener('scroll', () => { nav.style.background = window.scrollY > 50 ? 'rgba(9,10,12,0.97)' : 'rgba(9,10,12,0.88)'; });\n\n  /* SMOOTH SCROLL */\n  document.querySelectorAll('a[href^=\"#\"]').forEach(anchor => {\n    anchor.addEventListener('click', (e) => {\n      const target = document.querySelector(anchor.getAttribute('href'));\n      if (target) { e.preventDefault(); target.scrollIntoView({ behavior: 'smooth', block: 'start' }); }\n    });\n  });\n\n  /* STATS COUNTER */\n  function animateCounter(el, target, suffix, duration) {\n    duration = duration || 1800;\n    let start = 0;\n    const step = timestamp => {\n      if (!start) start = timestamp;\n      const progress = Math.min((timestamp - start) / duration, 1);\n      const ease = 1 - Math.pow(1 - progress, 3);\n      el.textContent = Math.floor(ease * target) + suffix;\n      if (progress < 1) requestAnimationFrame(step);\n      else el.textContent = target + suffix;\n    };\n    requestAnimationFrame(step);\n  }\n  const statsObserver = new IntersectionObserver((entries) => {\n    entries.forEach(e => {\n      if (e.isIntersecting) {\n        const nums = e.target.querySelectorAll('.stat-num');\n        nums.forEach(num => {\n          const t = num.textContent.trim();\n          if (t === '3×') animateCounter(num, 3, '×');\n          else if (t === '78%') animateCounter(num, 78, '%');\n          else if (t === '45%') animateCounter(num, 45, '%');\n        });\n        statsObserver.unobserve(e.target);\n      }\n    });\n  }, { threshold: 0.5 });\n  const statsBar = document.querySelector('.stats-bar');\n  if (statsBar) statsObserver.observe(statsBar);\n\n  /* LEAD FORM */\n  function openLeadForm() { document.getElementById('leadModal').classList.add('open'); document.body.style.overflow = 'hidden'; }\n  function closeLeadForm() { document.getElementById('leadModal').classList.remove('open'); document.body.style.overflow = ''; }\n  function handleLeadOverlay(e) { if (e.target === document.getElementById('leadModal')) closeLeadForm(); }\n  async function submitLeadForm(e) {\n    e.preventDefault();\n    const btn = document.getElementById('leadSubmitBtn');\n    btn.disabled = true; btn.textContent = 'Sending...';\n    try {\n      const res = await fetch('https://api.web3forms.com/submit', { method: 'POST', body: new FormData(document.getElementById('leadForm')) });\n      const data = await res.json();\n      if (data.success) {\n        document.getElementById('leadForm').style.display = 'none';\n        document.getElementById('leadSuccess').style.display = 'block';\n        setTimeout(closeLeadForm, 4000);\n      } else { btn.disabled = false; btn.textContent = 'Start My Free Trial →'; alert('Something went wrong. Please try again.'); }\n    } catch { btn.disabled = false; btn.textContent = 'Start My Free Trial →'; alert('Connection error. Please try again.'); }\n  }\n\n  /* DEMO MODAL */\n  function openDemo() { document.getElementById('demoModal').classList.add('open'); document.body.style.overflow = 'hidden'; }\n  function closeDemo() {\n    const video = document.getElementById('demoVideo');\n    document.getElementById('demoModal').classList.remove('open'); document.body.style.overflow = '';\n    video.pause(); video.currentTime = 0;\n    document.getElementById('videoCover').classList.remove('hidden');\n  }\n  function handleOverlayClick(e) { if (e.target === document.getElementById('demoModal')) closeDemo(); }\n  function startVideo() {\n    const video = document.getElementById('demoVideo');\n    const cover = document.getElementById('videoCover');\n    cover.classList.add('hidden');\n    video.play().catch(() => { cover.classList.remove('hidden'); });\n  }\n\n  /* ROI CALCULATOR */\n  function updateCalc() {\n    const calls     = parseInt(document.getElementById('s-calls').value);\n    const missedN10 = parseInt(document.getElementById('s-missed').value); // \"N in 10 calls\"\n    const job       = parseInt(document.getElementById('s-job').value);\n    const convN10   = parseInt(document.getElementById('s-conv').value);   // \"N in 10 callers\"\n\n    // Update slider labels (plain language)\n    document.getElementById('v-calls').textContent  = calls + ' calls';\n    document.getElementById('v-missed').textContent = missedN10 + ' in 10 calls';\n    document.getElementById('v-job').textContent    = '$' + job.toLocaleString();\n    document.getElementById('v-conv').textContent   = convN10 + ' in 10';\n\n    // Calculate\n    const missedPct  = missedN10 / 10;          // fraction of calls missed\n    const convPct    = convN10 / 10;             // fraction of callers who book\n    const missedN    = Math.round(calls * missedPct);                 // calls missed/mo\n    const lostJobs   = Math.round(missedN * convPct);                 // jobs lost/mo\n    const lostMo     = lostJobs * job;                                // revenue lost/mo\n\n    // LeadLock captures 80% of missed calls\n    const capCalls   = Math.round(missedN * 0.80);\n    const capJobs    = Math.round(capCalls * convPct);                // jobs recovered/mo\n    const recovMo    = capJobs * job;                                 // revenue recovered/mo\n\n    // Cost: $397/mo (Starter plan)\n    const costMo     = 397;\n    const netMo      = recovMo - costMo;                              // net profit/mo\n    const netYr      = netMo * 12;                                    // net profit/yr\n    const roi        = costMo > 0 ? Math.round(recovMo / costMo) : 0; // $X back per $1 spent\n\n    // Update results\n    document.getElementById('r-missed-n').textContent    = missedN + ' calls';\n    document.getElementById('r-lost-jobs').textContent   = lostJobs + (lostJobs === 1 ? ' job' : ' jobs');\n    document.getElementById('r-lost-mo').textContent     = '$' + lostMo.toLocaleString();\n    document.getElementById('r-cap-jobs').textContent    = capJobs + (capJobs === 1 ? ' job' : ' jobs');\n    document.getElementById('r-recovered-mo').textContent= '$' + recovMo.toLocaleString();\n    document.getElementById('r-net-mo').textContent      = (netMo >= 0 ? '$' : '-$') + Math.abs(netMo).toLocaleString();\n    document.getElementById('r-net-yr').textContent      = (netYr >= 0 ? '$' : '-$') + Math.abs(netYr).toLocaleString();\n    document.getElementById('r-roi').textContent         = '$' + roi.toLocaleString();\n    document.getElementById('r-roi-sub').textContent     = 'For every $1 you spend, LeadLock brings back $' + roi + ' in revenue';\n    document.getElementById('calc-cta').textContent      = 'Get LeadLock — Add $' + Math.abs(netMo).toLocaleString() + '/mo to Your Bottom Line →';\n\n    // Slider fill colors\n    ['s-calls','s-missed','s-job','s-conv'].forEach(function(id) {\n      const el  = document.getElementById(id);\n      const pct = ((el.value - parseFloat(el.min)) / (parseFloat(el.max) - parseFloat(el.min))) * 100;\n      el.style.background = 'linear-gradient(to right, var(--copper) ' + pct + '%, var(--border) ' + pct + '%)';\n    });\n  }\n\n  document.addEventListener('DOMContentLoaded', function() {\n    updateCalc();\n\n    /* HERO SUB — word-by-word slide-up reveal (expo-out), preserves <strong> */\n    (function() {\n      const sub = document.querySelector('.hero-sub');\n      if (!sub) return;\n      const nodes = [...sub.childNodes];\n      sub.innerHTML = '';\n      let i = 0;\n      const addWord = function(text, tag) {\n        const outer = document.createElement('span'); outer.className = 'word';\n        const inner = document.createElement('span'); inner.className = 'word-in';\n        inner.style.setProperty('--d', (0.55 + i * 0.028) + 's'); i++;\n        if (tag) { const t = document.createElement(tag); t.textContent = text; inner.appendChild(t); }\n        else { inner.textContent = text; }\n        outer.appendChild(inner); sub.appendChild(outer);\n      };\n      const process = function(node, tag) {\n        node.textContent.split(/(\\s+)/).forEach(function(p) {\n          if (p === '') return;\n          if (/^\\s+$/.test(p)) sub.appendChild(document.createTextNode(' '));\n          else addWord(p, tag);\n        });\n      };\n      nodes.forEach(function(n) {\n        if (n.nodeType === 3) process(n, null);\n        else if (n.nodeType === 1) process(n, n.tagName.toLowerCase());\n      });\n    })();\n\n    const video = document.getElementById('demoVideo');\n    if (video) {\n      video.addEventListener('error', function() {\n        document.getElementById('videoCover').style.display = 'none';\n        document.getElementById('videoError').style.display = 'flex';\n      });\n    }\n  });\n\n  /* ESC TO CLOSE */\n  document.addEventListener('keydown', function(e) {\n    if (e.key !== 'Escape') return;\n    if (document.getElementById('demoModal').classList.contains('open')) closeDemo();\n    if (document.getElementById('leadModal').classList.contains('open')) closeLeadForm();\n  });\n\n  /* ============================================================\n     MOTION LAYER — interactive scroll & pointer choreography\n     ============================================================ */\n  (function(){\n    var reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n    if (reduce) return;\n\n    /* HERO GLOW — mouse parallax */\n    var hero = document.querySelector('.hero');\n    var glow = document.querySelector('.hero-glow');\n    if (hero && glow) {\n      hero.addEventListener('mousemove', function(e){\n        var r = hero.getBoundingClientRect();\n        var x = (e.clientX - r.left) / r.width - 0.5;\n        var y = (e.clientY - r.top) / r.height - 0.5;\n        glow.style.transform = 'translate(calc(-50% + ' + (x*50) + 'px), calc(-50% + ' + (y*50) + 'px)) scale(1.06)';\n      });\n      hero.addEventListener('mouseleave', function(){\n        glow.style.transform = 'translate(-50%, -50%)';\n      });\n    }\n\n    /* HERO WAVE — gentle scroll parallax */\n    var wave = document.querySelector('.hero-wave');\n    if (wave) {\n      window.addEventListener('scroll', function(){\n        var y = window.scrollY;\n        if (y < 900) wave.style.transform = 'translateX(-50%) translateY(' + (y * 0.15) + 'px)';\n      }, { passive: true });\n    }\n\n    /* NUMBER-CARD COUNT-UP for plain \"NN%\" values */\n    var numObs = new IntersectionObserver(function(entries){\n      entries.forEach(function(e){\n        if (!e.isIntersecting) return;\n        var el = e.target, m = el.textContent.trim().match(/^(\\d+)%$/);\n        if (m && typeof animateCounter === 'function') animateCounter(el, parseInt(m[1],10), '%', 1400);\n        numObs.unobserve(el);\n      });\n    }, { threshold: 0.6 });\n    document.querySelectorAll('.num-value').forEach(function(el){ numObs.observe(el); });\n  })();\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
